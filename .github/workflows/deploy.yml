name: Deploy to Replicate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost
          sudo apt-get clean
          sudo docker image prune -af
          df -h /

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}
          cog-version: v0.21.0

      - name: Build and Push
        run: cog push r8.im/songdiandong/vton-tryon 2>&1 | tee /tmp/cog-push.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cog-build-logs
          path: /tmp/cog-push.log
