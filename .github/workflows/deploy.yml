name: Deploy to Replicate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost
          sudo apt-get clean
          sudo docker image prune -af
          df -h /

      - name: Install Cog
        env:
          COG_VERSION: "0.21.0"
        run: |
          curl -o /usr/local/bin/cog -L "https://github.com/replicate/cog/releases/download/v${COG_VERSION}/cog_Linux_x86_64"
          sudo chmod +x /usr/local/bin/cog
          cog version

      - name: Clean stale build cache
        run: rm -rf .cog

      - name: Build and Push with Cog
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: cog push r8.im/songdiandong/vton-tryon
